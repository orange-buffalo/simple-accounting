spring:
  main:
    banner-mode: "off"
    web-application-type: reactive

  datasource:
    url: jdbc:h2:/data/db/simple-accounting
    username: "${sa.database.username}"
    password: "${sa.database.password}"

  security:
    oauth2:
      client:
        registration:
          google-drive:
            provider: "google"
            scope:
              - "https://www.googleapis.com/auth/drive.file"
            redirect-uri: "${sa.public-url}/oauth-callback"
            client-id: "${sa.documents.storage.google-drive.client-id}"
            client-secret: "${sa.documents.storage.google-drive.client-secret}"

  jpa:
    properties:
      hibernate.create_empty_composites.enabled: true
  web:
    resources:
      add-mappings: false
  flyway:
    baseline-on-migrate: true
    baseline-version: "0001"
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-null-for-primitives: true

server:
  port: 9393
  compression:
    enabled: true
  error:
    whitelabel:
      enabled: false

sa:
  public-url: "https://simple-accounting.orange-buffalo.io"
  database:
    username: "sa"
    password: ""
  documents:
    storage:
      local-fs:
        enabled: false
        base-directory: /data/documents-storage/local
      google-drive:
        base-api-url: "https://www.googleapis.com"
        client-id: "<replace>"
        client-secret: "<replace>"
  backup:
    enabled: false
    scheduling-delay-in-hours: 12
    dropbox:
      active: false
      access-token: ""
      refresh-token: ""
      client-id: ""
      client-secret: ""
graphql:
  packages:
    - "io.orangebuffalo.simpleaccounting"
  endpoint: "/api/graphql"
  graphiql:
    enabled: false
  sdl:
    endpoint: "/api/graphql/schema"
  subscriptions:
    endpoint: "/api/graphql/subscriptions"
  batching:
    enabled: true
    strategy: SYNC_EXHAUSTION
---

spring:
  datasource:
