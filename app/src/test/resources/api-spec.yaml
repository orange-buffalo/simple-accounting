openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: ""
  description: Generated server url
paths:
  /api/users/{userId}:
    get:
      tags:
      - users-api
      operationId: getUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserDto"
    put:
      tags:
      - users-api
      operationId: updateUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserDto"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersApiUpdateUserErrors"
  /api/workspaces/{workspaceId}/documents:
    get:
      tags:
      - documents-api
      operationId: getDocuments
      parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          enum:
          - _NOT_SUPPORTED
      - name: "id[in]"
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
            format: int64
      - name: "id[eq]"
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: pageNumber
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: sortOrder
        in: query
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPageDocumentDto"
    post:
      tags:
      - documents-api
      operationId: uploadNewDocument
      parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDto"
  /api/users:
    get:
      tags:
      - users-api
      operationId: getUsers
      parameters:
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          enum:
          - _NOT_SUPPORTED
      - name: "freeSearchText[eq]"
        in: query
        required: false
        schema:
          type: string
      - name: pageNumber
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: sortOrder
        in: query
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiPagePlatformUserDto"
    post:
      tags:
      - users-api
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequestDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserDto"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersApiCreateUserErrors"
  /api/user-activation-tokens:
    post:
      tags:
      - user-activation-tokens-api
      operationId: createToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserActivationTokenRequestDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivationTokenDto"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivationTokensApiCreateTokenErrors"
  /api/user-activation-tokens/{token}/activate:
    post:
      tags:
      - user-activation-tokens-api
      operationId: activateUser
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserActivationRequestDto"
        required: true
      responses:
        "204":
          description: No Content
          content: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivationTokensApiActivateUserErrors"
  /api/workspaces/{workspaceId}/documents/{documentId}/download-token:
    get:
      tags:
      - documents-api
      operationId: getDownloadToken
      parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: documentId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDownloadTokenResponse"
  /api/workspaces/{workspaceId}/documents/{documentId}/content:
    get:
      tags:
      - documents-api
      operationId: getDocumentContent
      parameters:
      - name: workspaceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: documentId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataBuffer"
  /api/user-activation-tokens/{token}:
    get:
      tags:
      - user-activation-tokens-api
      operationId: getToken
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivationTokenDto"
  /api/user-activation-tokens/users/{userId}:
    get:
      tags:
      - user-activation-tokens-api
      operationId: getTokenByUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivationTokenDto"
  /api/push-notifications:
    get:
      tags:
      - push-notifications-api
      operationId: getPushNotificationMessages
      responses:
        "200":
          description: OK
          content:
            text/event-stream:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CurrentUserPushNotificationMessage"
  /api/downloads:
    get:
      tags:
      - downloads-api
      operationId: getContent
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataBuffer"
components:
  schemas:
    UpdateUserRequestDto:
      type: object
      properties:
        userName:
          type: string
          maxLength: 255
          minLength: 0
      required:
      - userName
    PlatformUserDto:
      type: object
      properties:
        userName:
          type: string
        id:
          type: integer
          format: int64
        version:
          type: integer
          format: int32
        admin:
          type: boolean
        activated:
          type: boolean
      required:
      - activated
      - admin
      - userName
      - version
    DocumentDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        version:
          type: integer
          format: int32
        name:
          type: string
        timeUploaded:
          type: string
          format: date-time
        sizeInBytes:
          type: integer
          format: int64
        storageId:
          type: string
        mimeType:
          type: string
      required:
      - id
      - mimeType
      - name
      - storageId
      - timeUploaded
      - version
    CreateUserRequestDto:
      type: object
      properties:
        userName:
          type: string
          maxLength: 255
          minLength: 0
        admin:
          type: boolean
      required:
      - admin
      - userName
    CreateUserActivationTokenRequestDto:
      type: object
      properties:
        userId:
          type: integer
          format: int64
      required:
      - userId
    UserActivationTokenDto:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
      required:
      - expiresAt
      - token
    UserActivationRequestDto:
      type: object
      properties:
        password:
          type: string
          maxLength: 100
          minLength: 0
      required:
      - password
    ApiPageDocumentDto:
      type: object
      properties:
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        data:
          type: array
          items:
            $ref: "#/components/schemas/DocumentDto"
      required:
      - data
      - pageNumber
      - pageSize
      - totalElements
    GetDownloadTokenResponse:
      type: object
      properties:
        token:
          type: string
      required:
      - token
    DataBuffer: {}
    ApiPagePlatformUserDto:
      type: object
      properties:
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        data:
          type: array
          items:
            $ref: "#/components/schemas/PlatformUserDto"
      required:
      - data
      - pageNumber
      - pageSize
      - totalElements
    CurrentUserPushNotificationMessage:
      type: object
      properties:
        eventName:
          type: string
        data: {}
      required:
      - eventName
    UserActivationTokensApiActivateUserErrors:
      type: object
      properties:
        error:
          type: string
          enum:
          - TokenExpired
        message:
          type: string
      required:
      - error
    UserActivationTokensApiCreateTokenErrors:
      type: object
      properties:
        error:
          type: string
          enum:
          - UserAlreadyActivated
        message:
          type: string
      required:
      - error
    UsersApiCreateUserErrors:
      type: object
      properties:
        error:
          type: string
          enum:
          - UserAlreadyExists
        message:
          type: string
      required:
      - error
    UsersApiUpdateUserErrors:
      type: object
      properties:
        error:
          type: string
          enum:
          - UserAlreadyExists
        message:
          type: string
      required:
      - error
    FieldErrorDto:
      type: object
      properties:
        field:
          type: string
        error:
          type: string
        message:
          type: string
        params:
          type: object
          additionalProperties:
            type: string
      required:
      - error
      - field
      - message
    InvalidInputErrorDto:
      type: object
      properties:
        error:
          type: string
        requestErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldErrorDto"
      required:
      - error
      - requestErrors
    SaApiErrorDto:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
      - error
