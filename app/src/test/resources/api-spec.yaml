openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: ""
  description: Generated server url
paths:
  /api/documents/upload/{token}:
    post:
      tags:
      - documents-content-api
      operationId: uploadDocument
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentGqlDto"
  /api/documents/download/{token}:
    get:
      tags:
      - documents-content-api
      operationId: getContent
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataBuffer"
components:
  schemas:
    DocumentGqlDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        version:
          type: integer
          format: int32
        name:
          type: string
        timeUploaded:
          type: string
          format: date-time
        sizeInBytes:
          type: integer
          format: int64
        storageId:
          type: string
        mimeType:
          type: string
        usedBy:
          type: array
          items:
            $ref: "#/components/schemas/DocumentUsageGqlDto"
      required:
      - id
      - mimeType
      - name
      - storageId
      - timeUploaded
      - usedBy
      - version
    DocumentUsageGqlDto:
      type: object
      properties:
        type:
          type: string
          enum:
          - EXPENSE
          - INCOME
          - INVOICE
          - INCOME_TAX_PAYMENT
        relatedEntityId:
          type: integer
          format: int64
        displayName:
          type: string
      required:
      - displayName
      - relatedEntityId
      - type
    DataBuffer: {}
    FieldErrorDto:
      type: object
      properties:
        field:
          type: string
        error:
          type: string
        message:
          type: string
        params:
          type: object
          additionalProperties:
            type: string
      required:
      - error
      - field
      - message
    InvalidInputErrorDto:
      type: object
      properties:
        error:
          type: string
        requestErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldErrorDto"
      required:
      - error
      - requestErrors
    SaApiErrorDto:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
      - error
